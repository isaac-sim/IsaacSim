[core]
reloadable = false
# Load at the start, load all schemas with order -100 (with order -1000 the USD libs are loaded)
order = -100

[package]
version = "1.1.1"
category = "Simulation"
title = "Omni USD Mujoco Schema"
description="Extension used to host all Mujoco USD schemas."
keywords = ["simulation", "usd", "schema"]
changelog = "docs/CHANGELOG.md"
readme = "docs/Overview.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true
writeTarget.python = true
writeTarget.usd = true

[dependencies]
"omni.usd.libs" = { }

[[python.module]]
name = "usd.schema.mujoco"

[documentation]
pages = ["docs/Overview.md", "docs/CHANGELOG.md"]
